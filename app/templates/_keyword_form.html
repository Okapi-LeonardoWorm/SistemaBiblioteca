<form id="keywordModalForm" action="{{ url_for('keywords.nova_palavra_chave') if not keyword_id else url_for('keywords.editar_palavra_chave', keyword_id=keyword_id) }}" method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        <label class="form-label">{{ form.word.label.text }} <small class="text-muted">(separe por vírgula ou ponto e vírgula; múltiplas tags de uma vez)</small></label>
        {{ form.word(class="form-control", placeholder="Ex.: Ficção, Aventura; Clássico") }}
        <div class="form-text">Você pode informar várias tags separadas por vírgula (,) ou ponto e vírgula (;).</div>
    </div>

    {% if keyword_id %}
    <div class="d-flex justify-content-end mt-3">
        <button
            type="button"
            class="btn btn-outline-danger"
            id="deleteKeywordBtn"
            data-delete-url="{{ url_for('keywords.excluir_palavra_chave', id=keyword_id) }}"
            data-csrf-token="{{ csrf_token() }}"
            data-confirm-message="Tem certeza que deseja excluir esta tag? Esta ação é lógica e a tag será apenas marcada como excluída."
        >
            <i class="fas fa-trash"></i> Excluir tag
        </button>
    </div>
    {% endif %}
</form>
